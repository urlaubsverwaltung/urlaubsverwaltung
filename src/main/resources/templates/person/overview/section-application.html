<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title></title>
  </head>
  <body>
    <th:block th:fragment="section">
      <div
        th:replace="~{fragments/section-heading::section-heading(~{::applications-heading-body}, ~{::applications-heading-actions})}"
      >
        <th:block th:ref="applications-heading-body">
          <h2 id="overtime" th:text="#{applications.title}">Abwesenheiten</h2>
        </th:block>
        <th:block th:ref="applications-heading-actions">
          <div class="ml-auto flex flex-col @2xl/main:flex-row @2xl/main:gap-2">
            <a
              th:if="${applicationOverviewInformation.canAddApplicationForLeaveForMyself}"
              class="icon-link flex items-center flex-row-reverse @2xl/main:flex-row"
              href="#"
              th:href="@{/web/application/new}"
            >
              <svg th:replace="~{icon/plus-square::svg(className='w-5 h-5')}"></svg>&nbsp;
              <span th:text="#{action.apply.vacation}"></span>
            </a>
            <a
              th:if="${applicationOverviewInformation.canAddApplicationForLeaveForAnotherUser}"
              class="icon-link flex items-center flex-row-reverse @2xl/main:flex-row"
              href="#"
              th:href="@{/web/application/new (personId=${person.id})}"
            >
              <svg th:replace="~{icon/plus-square::svg(className='w-5 h-5')}"></svg>&nbsp;
              <span th:text="#{action.apply.vacation}"></span>
            </a>
          </div>
        </th:block>
      </div>

      <div class="mb-6 flex flex-wrap space-y-8 @5xl/main:space-y-0">
        <div class="w-full @5xl/main:w-1/3"></div>
        <div class="w-full @2xl/main:w-1/2 @5xl/main:w-1/3">
          <div th:replace="~{fragments/box::box-with-icon(~{::holidays-sum-box-icon}, ~{::holidays-sum-box-body})}">
            <th:block th:ref="holidays-sum-box-icon">
              <div
                th:replace="~{fragments/rounded::block(content=~{::holidays-sum-box-icon-rounded}, className='bg-amber-300 text-white dark:bg-amber-400 dark:text-zinc-900')}"
              >
                <th:block th:ref="holidays-sum-box-icon-rounded">
                  <svg th:replace="~{icon/sun::svg(className='w-8 h-8')}" />
                </th:block>
              </div>
            </th:block>
            <th:block th:ref="holidays-sum-box-body">
              <span class="text-sm text-black/75 dark:text-zinc-300" th:text="#{overview.vacations.holidayLeave.1}">
                Es wurden beantragt
              </span>
              <span
                class="my-1 text-lg font-medium"
                th:text="#{overview.vacations.holidayLeave.2(${applicationOverviewInformation.usedDaysOverview.holidayDays.sum})}"
              >
                18,5 Tage Erholungsurlaub
              </span>
              <span class="text-sm text-black/75 dark:text-zinc-300">
                <span class="flex items-center">
                  <span class="text-emerald-500 flex items-center">
                    <svg th:replace="~{icon/check::svg(className='w-5 h-5')}"></svg>
                  </span>
                  <span
                    th:text="#{overview.vacations.holidayLeaveAllowed(${applicationOverviewInformation.usedDaysOverview.holidayDaysAllowed.sum})}"
                  ></span>
                </span>
              </span>
            </th:block>
          </div>
        </div>
        <div class="w-full @2xl/main:w-1/2 @5xl/main:w-1/3">
          <div th:replace="~{fragments/box::box-with-icon(~{::other-days-sum-box-icon}, ~{::other-days-sum-box-body})}">
            <th:block th:ref="other-days-sum-box-icon">
              <div
                th:replace="~{fragments/rounded::block(content=~{::other-days-sum-box-icon-rounded}, className='bg-amber-300 text-white dark:bg-amber-400 dark:text-zinc-900')}"
              >
                <th:block th:ref="other-days-sum-box-icon-rounded">
                  <svg th:replace="~{icon/flag::svg(className='w-8 h-8')}" />
                </th:block>
              </div>
            </th:block>
            <th:block th:ref="other-days-sum-box-body">
              <span class="text-sm text-black/75 dark:text-zinc-300" th:text="#{overview.vacations.otherLeave.1}">
                Es wurden beantragt
              </span>
              <span
                class="my-1 text-lg font-medium"
                th:text="#{overview.vacations.otherLeave.2(${applicationOverviewInformation.usedDaysOverview.otherDays.sum})}"
              >
                2,5 Tage andere Abwesenheiten
              </span>
              <span class="text-sm text-black/75 dark:text-zinc-300">
                <span class="flex items-center">
                  <span class="text-emerald-500 flex items-center">
                    <svg th:replace="~{icon/check::svg(className='w-5 h-5')}"></svg>
                  </span>
                  <span
                    th:text="#{overview.vacations.otherLeaveAllowed(${applicationOverviewInformation.usedDaysOverview.otherDaysAllowed.sum})}"
                  ></span>
                </span>
              </span>
            </th:block>
          </div>
        </div>
      </div>

      <table class="mb-4 list-table selectable-table text-sm">
        <tbody>
          <tr
            th:each="app, loopStatus : ${applicationOverviewInformation.applications}"
            th:class="${app.status.name == 'CANCELLED' || app.status.name == 'REJECTED' || app.status.name == 'REVOKED' ? 'inactive' : 'active'}"
            th:onclick="|navigate('/web/application/${app.id}');|"
          >
            <td class="hidden print:table-cell">
              <th:block th:text="${#messages.msg(app.status)}"></th:block>
            </td>
            <td class="py-4 absence-type_color-box-parent">
              <div
                class="absence-type_color-box"
                th:classappend="|
                ${app.status.name == 'WAITING' ? 'absence-type_color-box-waiting' : ''}
                ${app.status.name == 'TEMPORARY_ALLOWED' ? 'absence-type_color-box-temporary-allowed' : ''}
                ${app.status.name == 'ALLOWED' ? 'absence-type_color-box-allowed' : ''}
                ${app.status.name == 'ALLOWED_CANCELLATION_REQUESTED' ? 'absence-type_color-box-cancellation-requested' : ''}
                ${app.status.name == 'CANCELLED' ? 'absence-type_color-box-cancelled' : ''}
                ${app.status.name == 'REJECTED' || app.status.name == 'REVOKED' ? 'absence-type_color-box-rejected-revoked' : ''}
                |"
                th:styleappend="|${'--absence-bar-color:var(--absence-color-' + app.vacationType.color + ');'}|"
                th:data-title="${#messages.msg(app.status)}"
              >
                &nbsp;
              </div>
            </td>
            <td class="text-center">
              <span th:text="#{overview.vacations.days(${app.workDays})}"></span>
              <th:block th:if="${app.startDate.year != app.endDate.year}">
                <span th:class="|text-gray-500 days-${loopStatus.index}|">
                  <!-- is filled by javascript-->
                </span>
                <script type="text/javascript" th:inline="javascript">
                  document.addEventListener("DOMContentLoaded", function () {
                    const dayLength = /*[[${app.dayLength}]]*/ 1;
                    const personId = /*[[${app.personId}]]*/ 1;
                    const startDate = /*[[${#temporals.format(app.startDate, 'yyyy-MM-dd')}]]*/ "2022-07-20";
                    const endDate = /*[[${#temporals.format(app.endDate, 'yyyy-MM-dd')}]]*/ "2022-07-20";

                    sendGetDaysRequestForTurnOfTheYear(
                      /*[[@{/api}]]*/ "",
                      new Date(startDate),
                      new Date(endDate),
                      dayLength,
                      personId,
                      /*[[${'.days-' + loopStatus.index}]]*/ "",
                    );
                  });
                </script>
              </th:block>
              <span th:if="${app.vacationType.category.name == 'OVERTIME' && app.hours != null}" class="text-gray-500">
                <br />
                <th:block th:text="${{app.hours}}" />
                <th:block th:text="#{application.data.hours.number}" />
              </span>
            </td>
            <td class="py-4">
              <a href="#" th:href="@{/web/application/{app} (app=${app.id})}" class="hover:no-underline group">
                <span
                  class="block mb-0.5 text-lg group-hover:underline group-focus:underline"
                  th:text="${app.vacationType.label}"
                ></span>
                <span class="block text-[#444444] dark:text-zinc-200">
                  <th:block th:text="#{absence.period.for}" />
                  <th:block th:if="${app.startDate == app.endDate}">
                    <th:block
                      th:replace="~{fragments/date::date(date=${app.startDate}, pattern='EEEE, dd.MM.yyyy')}"
                    ></th:block
                    >,
                    <th:block
                      th:if="${app.startTime != null && app.endTime != null}"
                      th:with="APPLICATION_START_TIME=${#temporals.format(app.startDateWithTime, #messages.msg('pattern.time'))}, APPLICATION_END_TIME=${#temporals.format(app.endDateWithTime, #messages.msg('pattern.time'))}"
                      th:text="#{absence.period.time(${APPLICATION_START_TIME},${APPLICATION_END_TIME})}"
                    ></th:block>
                    <th:block
                      th:if="${app.startTime == null || app.endTime == null}"
                      th:text="${#messages.msg(app.dayLength)}"
                    ></th:block>
                  </th:block>
                  <th:block th:if="${app.startDate != app.endDate}">
                    <th:block
                      th:replace="~{fragments/date-range::date-range(from=${app.startDate}, to=${app.endDate}, pattern='EEEE, dd.MM.yyyy')}"
                    ></th:block>
                  </th:block>
                </span>
              </a>
            </td>
            <td class="hidden @3xl/main:table-cell print:hidden">
              <div class="flex items-center">
                <th:block th:if="${#lists.isEmpty(app.holidayReplacements) }"> keine Vertretung </th:block>
                <th:block th:if="${not #lists.isEmpty(app.holidayReplacements)}">
                  vertreten von &nbsp;
                  <th:block th:each="holidayReplacement : ${app.holidayReplacements}">
                    <span class="text-blue-50 dark:text-sky-800 mr-1">
                      <img
                        th:replace="~{fragments/avatar::avatar-bordered(url=${holidayReplacement.gravatarUrl + '?d=404&s=30'},niceName=${holidayReplacement.niceName},initials=${holidayReplacement.initials},width='30',height='30', personId=null)}"
                        alt=""
                      />
                    </span>
                  </th:block>
                </th:block>
              </div>
            </td>
            <td class="hidden @3xl/main:table-cell print:hidden">
              <div class="opacity-100! flex items-center justify-end">
                <span data-grid-ref="action-buttons" class="flex flex-row gap-1">
                  <a
                    th:if="${app.isAllowedToEdit}"
                    class="button flex-1 justify-center"
                    th:href="@{/web/application/{app}/edit (app=${app.id})}"
                  >
                    <svg th:replace="~{icon/pencil::svg(className='w-4 h-4 shrink-0')}"></svg>
                    <span
                      th:text="#{action.edit}"
                      class="ml-2 @lg/main:ml-0 @lg/main:sr-only @2xl/main:not-sr-only @2xl/main:ml-2 @3xl/main:sr-only @3xl/main:ml-0 @5xl/main:not-sr-only @5xl/main:ml-2"
                    ></span>
                  </a>
                  <a class="button flex-1 justify-center" th:href="@{/web/application/{app} (app=${app.id})}">
                    <svg th:replace="~{icon/info::svg(className='w-4 h-4 shrink-0')}"></svg>
                    <span
                      th:text="#{action.details}"
                      class="ml-2 @lg/main:ml-0 @lg/main:sr-only @2xl/main:not-sr-only @2xl/main:ml-2 @3xl/main:sr-only @3xl/main:ml-0 @5xl/main:not-sr-only @5xl/main:ml-2"
                      >Details</span
                    >
                  </a>
                </span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <p class="flex items-center justify-center gap-1">
        <span class="text-sm text-gray-600 dark:text-zinc-400">
          <th:block th:text="${applicationOverviewInformation.numberOfShownApplications}">6</th:block>
          <th:block th:text="#{overview.vacations.of}">von</th:block>
          <th:block th:text="${applicationOverviewInformation.numberOfTotalApplications}">142</th:block>
        </span>
        &nbsp;-&nbsp;
        <a
          class="underline text-sm text-gray-600 hover:text-gray-800 dark:text-zinc-400 dark:hover:text-zinc-300"
          href="#"
          th:href="@{/web/persons/me/applications (year=${selectedYear})}"
        >
          <span th:text="#{overview.vacations.showAll}">Alle anzeigen</span>
        </a>
      </p>
    </th:block>
  </body>
</html>
