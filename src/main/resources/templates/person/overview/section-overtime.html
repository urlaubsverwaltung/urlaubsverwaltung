<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title></title>
  </head>
  <body>
    <th:block th:fragment="section">
      <div
        th:replace="~{fragments/section-heading::section-heading(~{::overtime-heading-body}, ~{::overtime-heading-actions})}"
      >
        <th:block th:ref="overtime-heading-body">
          <h2 id="overtime" th:text="#{overtime.title}">Überstunden</h2>
        </th:block>

        <th:block th:ref="overtime-heading-actions">
          <div class="ml-auto flex flex-col @2xl/main:flex-row @2xl/main:gap-2">
            <a
              th:if="${overtimeOverviewInformation.userIsAllowedToCreateOvertime}"
              class="icon-link flex items-center flex-row-reverse @2xl/main:flex-row"
              href="#"
              th:href="@{/web/overtime/new (person=${person.id})}"
            >
              <svg th:replace="~{icon/plus-square::svg(className='w-5 h-5')}"></svg>&nbsp;
              <span th:text="#{action.overtime.new}"></span>
            </a>
          </div>
        </th:block>
      </div>

      <div class="flex flex-wrap space-y-8 @5xl/main:space-y-0">
        <div class="w-full @5xl/main:w-1/3"></div>
        <div class="w-full @2xl/main:w-1/2 @5xl/main:w-1/3">
          <div
            th:replace="~{overtime/box::overtime-box-total(overtimeTotal=${overtimeOverviewInformation.overtimeTotal})}"
          ></div>
        </div>
        <div class="w-full @2xl/main:w-1/2 @5xl/main:w-1/3">
          <div
            th:replace="~{overtime/box::overtime-box-left(overtimeLeft=${overtimeOverviewInformation.overtimeLeft})}"
          ></div>
        </div>
      </div>

      <div class="flex items-center justify-end text-sm mt-4">
        <a
          class="icon-link @2xl/main:flex-row text-sm"
          href="#"
          th:href="@{/web/overtime (person=${person.id}, year=${selectedYear})}"
        >
          <span th:text="#{overview.overtime.showAll}">Alle anzeigen</span>
        </a>
      </div>
    </th:block>
  </body>
</html>
