<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title></title>
  </head>
  <body>
    <th:block th:fragment="section">
      <div
        th:replace="~{fragments/section-heading::section-heading(~{::absences-heading-body}, ~{::absences-heading-actions})}"
      >
        <th:block th:ref="absences-heading-body">
          <h2 id="anchorSickNotes" th:text="#{sicknotes.title}">Krankmeldungen</h2>
        </th:block>
        <th:block th:ref="absences-heading-actions">
          <div class="ml-auto flex flex-col @2xl/main:flex-row @2xl/main:gap-2">
            <a
              th:if="${sickNotesOverview.canAddSickNoteAnotherUser}"
              class="icon-link flex items-center flex-row-reverse @2xl/main:flex-row"
              href="#"
              th:href="@{/web/sicknote/new (person=${person.id})}"
            >
              <svg th:replace="~{icon/plus-square::svg(className='w-5 h-5')}"></svg>&nbsp;
              <span th:text="#{action.apply.sicknote}"></span>
            </a>
          </div>
        </th:block>
      </div>

      <div class="mb-6 flex flex-wrap space-y-8 @5xl/main:space-y-0 @5xl/main:mb-10">
        <div class="w-full @5xl/main:w-0"></div>
        <div class="w-full @2xl/main:w-1/2 @5xl/main:w-1/3">
          <div th:replace="~{fragments/box::box-with-icon(~{::sick-days-box-icon}, ~{::sick-days-box-body})}">
            <th:block th:ref="sick-days-box-icon">
              <div
                th:replace="~{fragments/rounded::block(content=~{::sick-days-box-icon-rounded}, className='bg-red-600 text-white dark:bg-red-600 dark:text-zinc-900')}"
              >
                <th:block th:ref="sick-days-box-icon-rounded">
                  <svg th:replace="~{icon/medkit::svg(className='w-8 h-8')}" />
                </th:block>
              </div>
            </th:block>
            <th:block th:ref="sick-days-box-body">
              <span class="text-sm text-black/75 dark:text-zinc-300" th:text="#{overview.sicknotes.sickdays.1}">
                Es bestehen
              </span>
              <span
                class="my-1 text-lg font-medium"
                th:text="#{overview.sicknotes.sickdays.2(${sickNotesOverview.sickDaysSummary.sickDays.days['TOTAL']})}"
              >
                5,5 Krankheitstage
              </span>
              <span class="text-sm text-black/75 dark:text-zinc-300">
                <span class="flex items-center">
                  <span class="text-emerald-500 flex items-center">
                    <svg th:replace="~{icon/check::svg(className='w-5 h-5')}"></svg>
                  </span>
                  <span
                    th:text="#{overview.sicknotes.sickdays.aub(${sickNotesOverview.sickDaysSummary.sickDays.days['WITH_AUB']})}"
                  ></span>
                </span>
              </span>
            </th:block>
          </div>
        </div>
        <div class="w-full @2xl/main:w-1/2 @5xl/main:w-1/3">
          <div
            th:replace="~{fragments/box::box-with-icon(~{::child-sick-days-box-icon}, ~{::child-sick-days-box-body})}"
          >
            <th:block th:ref="child-sick-days-box-icon">
              <div
                th:replace="~{fragments/rounded::block(content=~{::child-sick-days-box-icon-rounded}, className='bg-red-600 text-white dark:bg-red-600 dark:text-zinc-900')}"
              >
                <th:block th:ref="child-sick-days-box-icon-rounded">
                  <svg th:replace="~{icon/child::svg(className='w-8 h-8')}"></svg>
                </th:block>
              </div>
            </th:block>
            <th:block th:ref="child-sick-days-box-body">
              <span class="text-sm text-black/75 dark:text-zinc-300" th:text="#{overview.sicknotes.sickdays.child.1}">
                Es bestehen
              </span>
              <span
                class="my-1 text-lg font-medium"
                th:text="#{overview.sicknotes.sickdays.child.2(${sickNotesOverview.sickDaysSummary.childSickDays.days['TOTAL']})}"
              >
                3.0 Kind-Krankheitstage
              </span>
              <span class="text-sm text-black/75 dark:text-zinc-300">
                <span class="flex items-center">
                  <span class="text-emerald-500 flex items-center">
                    <svg th:replace="~{icon/check::svg(className='w-5 h-5')}"></svg>
                  </span>
                  <span
                    th:text="#{overview.sicknotes.sickdays.aub(${sickNotesOverview.sickDaysSummary.childSickDays.days['WITH_AUB']})}"
                  ></span>
                </span>
              </span>
            </th:block>
          </div>
        </div>
      </div>

      <table class="mb-4 list-table selectable-table text-sm">
        <tbody>
          <tr
            th:each="sickNote,loopStatus : ${sickNotesOverview.sickNotes}"
            th:class="${(sickNote.status.name == 'ACTIVE' || sickNote.status.name == 'SUBMITTED') ? 'active' : 'inactive'}"
            th:onclick="|navigate('/web/sicknote/${sickNote.id}');|"
            th:with="sickNoteStatusNameI18n=${#messages.msg('sicknote.status.' + sickNote.status.name)}"
          >
            <td class="py-4 absence-type_color-box-parent">
              <div
                class="absence-type_color-box"
                th:classappend="|
                ${sickNote.status.name == 'SUBMITTED' ? 'absence-type_color-box-waiting' : ''}
                ${sickNote.status.name == 'ACTIVE' ? 'absence-type_color-box-allowed' : ''}
                ${sickNote.status.name == 'CONVERTED_TO_VACATION' ? 'absence-type_color-box-cancelled' : ''}
                ${sickNote.status.name == 'CANCELLED' ? 'absence-type_color-box-cancelled' : ''}
                |"
                th:styleappend="'--absence-bar-color: var(--sick-note-color);'"
                th:data-title="${sickNoteStatusNameI18n}"
              >
                &nbsp;
              </div>
            </td>
            <td class="text-center">
              <span th:text="#{overview.sicknotes.sickdays.days(${sickNote.workDays})}"></span>
            </td>
            <td>
              <div class="flex items-center justify-end">
                <th:block th:if="${sickNote.sickNoteType.category.name == 'SICK_NOTE_CHILD'}">
                  <svg th:replace="~{icon/child::svg(className='w-6 h-6')}"></svg>
                </th:block>
                <th:block th:if="${sickNote.sickNoteType.category.name != 'SICK_NOTE_CHILD'}">
                  <svg th:replace="~{icon/medkit::svg(className='w-6 h-6')}"></svg>
                </th:block>
              </div>
            </td>
            <td class="py-4">
              <a th:href="@{/web/sicknote/{sickNote} (sickNote=${sickNote.id})}" class="hover:no-underline group">
                <span
                  class="block mb-1 text-lg group-hover:underline group-focus:underline"
                  th:text="${#messages.msg(sickNote.sickNoteType.messageKey)}"
                ></span>
                <span class="flex flex-col lg:flex-row text-[#444444] dark:text-zinc-200">
                  <th:block th:text="#{absence.period.for}" />
                  <th:block
                    th:replace="~{fragments/date-range::date-range-all(
                  from=${sickNote.startDate},
                  to=${sickNote.endDate},
                  dayLength=${sickNote.dayLength}
                )}"
                  ></th:block>
                </span>
                <span th:if="${sickNote.aubPresent}" class="text-sm text-black/75 dark:text-zinc-300">
                  <span class="flex items-center">
                    <span class="text-emerald-500 flex items-center">
                      <svg th:replace="~{icon/check::svg(className='w-4 h-4')}"></svg>
                    </span>
                    &nbsp;
                    <span th:text="#{overview.sicknotes.sickdays.aub(${sickNote.workDaysWithAub})}"></span>
                  </span>
                </span>
              </a>
            </td>
            <td class="hidden @3xl/main:table-cell">
              <div class="opacity-100! flex items-center justify-end">
                <span data-grid-ref="action-buttons" class="flex flex-row gap-1">
                  <a
                    class="button flex-1 justify-center"
                    th:href="@{/web/sicknote/{sickNote} (sickNote=${sickNote.id}, action='cancel', shortcut=true)}"
                    th:if="${sickNote.allowedToCancel}"
                  >
                    <svg th:replace="~{icon/trash-2::svg(className='w-4 h-4 shrink-0')}"></svg>
                    <span
                      th:text="#{action.delete}"
                      class="ml-2 @lg/main:ml-0 @lg/main:sr-only @2xl/main:not-sr-only @2xl/main:ml-2 @3xl/main:sr-only @3xl/main:ml-0 @5xl/main:not-sr-only @5xl/main:ml-2"
                      >Cancel</span
                    >
                  </a>
                  <a
                    th:if="${sickNote.allowedToEdit}"
                    class="button flex-1 justify-center"
                    th:href="@{/web/sicknote/{sickNote}/edit (sickNote=${sickNote.id})}"
                  >
                    <svg th:replace="~{icon/pencil::svg(className='w-4 h-4 shrink-0')}"></svg>
                    <span
                      th:text="#{action.edit}"
                      class="ml-2 @lg/main:ml-0 @lg/main:sr-only @2xl/main:not-sr-only @2xl/main:ml-2 @3xl/main:sr-only @3xl/main:ml-0 @5xl/main:not-sr-only @5xl/main:ml-2"
                      >Edit</span
                    >
                  </a>
                </span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <p class="flex items-center justify-center gap-1">
        <span class="text-sm text-gray-600 dark:text-zinc-400">
          <th:block th:text="${sickNotesOverview.numberOfShownSickNotes}">6</th:block>
          <th:block th:text="#{overview.sicknotes.of}">von</th:block>
          <th:block th:text="${sickNotesOverview.numberOfTotalSickNotes}">142</th:block>
        </span>
        &nbsp;-&nbsp;
        <a
          class="underline text-sm text-gray-600 hover:text-gray-800 dark:text-zinc-400 dark:hover:text-zinc-300"
          href="#"
          th:href="@{/web/persons/__${person.id}__/sicknotes (year=${selectedYear})}"
        >
          <span th:text="#{overview.sicknotes.showAll}">Alle anzeigen</span>
        </a>
      </p>
    </th:block>
  </body>
</html>
