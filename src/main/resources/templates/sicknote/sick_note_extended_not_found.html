<!doctype html>
<html
  lang="en"
  th:lang="${language}"
  th:class="|theme-${theme}|"
  th:data-nav-collapsed="${navigationCollapsed ? 'true' : null}"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:asset="http://www.w3.org/1999/xhtml"
>
  <head th:replace="~{_layout::head(title=~{::title}, scriptsDefer=~{::scriptsDefer}, preload=~{::preload})}">
    <title th:text="#{sicknote.extend.header.title}">Krankmeldung erweitern</title>
    <th:block th:fragment="preload">
      <link rel="preload" th:replace="~{fragments/asset-dependency-preload::links('sick_note_extend.js')}" />
    </th:block>
    <th:block th:fragment="scriptsDefer">
      <script defer type="module" asset:src="sick_note_extend.js"></script>
    </th:block>
  </head>
  <body th:replace="~{_layout::body(content=~{::main})}">
    <main th:fragment="main" class="content-container content--max-w">
      <h1 th:text="#{sicknote.extend.title}">Weiter Krank melden</h1>
      <p class="mt-8" th:text="#{sicknote.extend.not-found.paragraph}">
        Es gibt keine laufende Krankmeldung die erweitert werden könnte.
      </p>
      <p
        class="mt-1"
        th:with="href=@{/web/sicknote/new}, text=#{sicknote.extend.not-found.create-new.link.text}, link=${'<a href=' + href + '>' + text + '</a>'}"
        th:utext="#{sicknote.extend.not-found.create-new.paragraph(${link})}"
      >
        Du kannst <a href="#">eine neue anlegen</a>.
      </p>
    </main>
  </body>
</html>
