<!doctype html>
<html lang="en" th:lang="${language}" th:class="|theme-${theme}|" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{_layout::head(title=~{::title})}">
    <title th:text="#{error-page.common.meta.title}"></title>
  </head>
  <body th:replace="~{_layout::body(~{::main})}">
    <main th:ref="main" class="content-container">
      <div class="flex justify-center">
        <div
          class="mt-8 w-full max-w-screen-xl flex flex-col @5xl/main:flex-row @5xl/main:items-start @5xl/main:justify-between @5xl/main:mt-16"
        >
          <div class="px-8 @lg/main:px-16">
            <h1
              class="flex flex-col gap-2 text-3xl font-medium @2xl/main:flex-row @2xl/main:gap-0.5 @5xl/main:flex-col @5xl/main:gap-2 @5xl/main:text-5xl @5xl/main:leading-[1]"
            >
              404&nbsp;
              <span th:text="#{error-page.not-found.title}"></span>
            </h1>
            <p class="mt-8 text-xl" th:text="#{error-page.not-found.paragraph}"></p>
            <div
              class="mt-8 @2xl/main:mt-8 text-lg flex flex-col @2xl/main:flex-row space-y-4 @2xl/main:space-y-0 @2xl/main:space-x-2"
              th:with="previousPageLink=${header_referer}"
            >
              <a
                th:if="${not #strings.isEmpty(previousPageLink)}"
                href="#"
                th:href="${previousPageLink}"
                class="button text-base px-4 py-2"
                th:text="#{error-page.goto.previous}"
              ></a>
              <a href="/" class="button text-base px-4 py-2" th:text="#{error-page.goto.start}"></a>
            </div>
          </div>
          <div class="shrink-0 mt-12 flex justify-center @5xl/main:mr-16">
            <picture th:if="${theme == 'system'}">
              <source th:srcset="@{/images/404_bear_dark.png}" media="(prefers-color-scheme: dark)" />
              <img src="#" th:src="@{/images/404_bear.png}" alt="" />
            </picture>
            <th:block
              th:if="${theme != 'system'}"
              th:with="src=${theme == 'dark' ? '/images/404_bear_dark.png' : '/images/404_bear.png'}"
            >
              <img src="#" th:src="@{${src}}" alt="" />
            </th:block>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
