<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Navigation fragment</title>
  </head>
  <body>
    <div th:fragment="avatar">
      <button popovertarget="avatar-menu" class="flex items-center gap-1" data-test-id="avatar">
        <span class="shrink-0 inline-flex text-blue-200 dark:text-sky-800">
          <img
            th:replace="~{fragments/avatar::avatar(className='w-8 h-8 lg:w-9 lg:h-9',url=${menuGravatarUrl + '?d=404&s=40'},niceName=${userFirstName + ' ' + userLastName},initials=${userInitials},width='40',height='40',personId=null)}"
            alt=""
          />
        </span>
        <svg th:replace="~{icon/chevron-down::svg(className='w-4 h-4')}"></svg>
      </button>
      <div
        popover
        id="avatar-menu"
        class="nav-popover-menu-container nav-avatar-popover popover popover--slide-to-left"
        data-test-id="avatar-popupmenu"
      >
        <div class="navigation-popover-menu-header">
          <a
            href="#"
            th:href="@{/web/person/{userId}/overview(userId=${userId})}"
            class="flex items-center gap-4 no-underline"
          >
            <span class="text-blue-200 dark:text-sky-800">
              <img
                th:replace="~{fragments/avatar::avatar(url=${menuGravatarUrl + '?d=404&s=128'},niceName=${userFirstName + ' ' + userLastName},initials=${userInitials},width='64',height='64',personId=null)}"
                alt=""
              />
            </span>
            <span class="block whitespace-nowrap overflow-hidden text-ellipsis">
              <span
                th:text="#{nav.avatar-menu.signed-in-as}"
                class="text-sm block text-gray-600 dark:text-zinc-100"
              ></span>
              <span
                class="text-lg leading-none text-gray-600 dark:text-zinc-100"
                th:text="${userFirstName + ' ' + userLastName}"
              >
                Max Mustermann
              </span>
            </span>
          </a>
        </div>
        <div class="navigation-popover-menu-content">
          <ul class="navigation-popover-menu">
            <li>
              <a
                th:replace="~{::nav-popup-menu-link(href=@{/web/person/{userId}(userId=${userId})}, icon=~{::menu-person-icon}, text=#{nav.account.title})}"
              >
                <svg th:ref="menu-person-icon" th:replace="~{icon/user-circle::svg(className='w-6 h-6')}"></svg>
              </a>
            </li>
            <li>
              <a
                th:replace="~{::nav-popup-menu-link(href=@{/web/person/{userId}/notifications(userId=${userId})}, icon=~{::menu-notifications-icon}, text=#{nav.notifications.title})}"
              >
                <svg th:ref="menu-notifications-icon" th:replace="~{icon/mail::svg(className='w-6 h-6')}"></svg>
              </a>
            </li>
            <li>
              <a
                th:replace="~{::nav-popup-menu-link(href=@{/web/person/{userId}/settings(userId=${userId})}, icon=~{::menu-user-settings-icon}, text=#{nav.user-settings.title})}"
              >
                <svg th:ref="menu-user-settings-icon" th:replace="~{icon/sliders::svg(className='w-6 h-6')}"></svg>
              </a>
            </li>
            <li role="separator" class="border-t border-t-gray-100 dark:border-t-zinc-700"></li>
            <li>
              <form th:action="@{/logout}" method="POST">
                <button type="submit" class="navigation-popover-menu__link" data-test-id="logout">
                  <svg th:replace="~{icon/logout::svg(className='w-6 h-6')}"></svg>
                  <th:block th:text="#{nav.signout.title}"></th:block>
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <a
      th:with="external=${false}"
      th:fragment="nav-popup-menu-link(href, icon, text)"
      th:href="${href}"
      class="navigation-popover-menu__link"
      th:data-test-id="${dataTestId}"
    >
      <svg th:replace="${icon}"></svg>
      <span class="whitespace-nowrap text-ellipsis overflow-hidden" style="min-width: 0" th:text="${text}"></span>
    </a>

    <a
      th:fragment="nav-popup-menu-link-external(href, icon, text)"
      th:href="${href}"
      class="navigation-popover-menu__link"
      target="_blank"
      rel="noopener"
      th:data-test-id="${dataTestId}"
    >
      <svg th:replace="${icon}"></svg>
      <span class="flex items-center gap-2">
        <span class="whitespace-nowrap text-ellipsis overflow-hidden" style="min-width: 0" th:text="${text}"></span>
        <svg th:replace="~{icon/external-link::svg(className='h-4 w-4')}"></svg>
      </span>
    </a>
  </body>
</html>
