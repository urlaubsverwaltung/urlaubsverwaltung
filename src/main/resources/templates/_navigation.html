<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Navigation</title>
  </head>
  <body>
    <th:block th:fragment="nav">
      <div class="topbar-cell navigation-container desktop:h-auto">
        <button class="navigation-button flex items-center gap-2 desktop:hidden" popovertarget="navigation">
          <svg th:replace="~{icon/menu::svg(className='w-5 h-5')}" />
          <th:block th:text="#{nav.menu}">Menü</th:block>
        </button>
        <nav id="navigation" popover class="navigation popover popover--slide-to-right">
          <div class="navigation-inner">
            <div th:if="${not #lists.isEmpty(navigation.favorites)}">
              <span id="nav-group-quick-label" class="sr-only nav-group-label">
                :<th:block th:text="#{nav.quick}">Einreichen</th:block>
              </span>
              <ul aria-labelledby="nav-group-quick-label" class="gap-0">
                <li th:each="link : ${navigation.favorites}">
                  <a
                    class="navigation-link flex items-center gap-2"
                    th:classappend="${link.active ? 'navigation-link--active' : ''}"
                    th:id="${link.id}"
                    th:href="@{__${link.href}__}"
                    th:data-test-id="${link.dataTestId}"
                  >
                    <span class="rounded p-1 bg-green-300 dark:bg-green-500 dark:text-zinc-900">
                      <svg th:replace="~{icon/plus::svg(className='w-3 h-3 stroke-4')}"></svg>
                    </span>
                    <span class="nav-link-text" th:text="${#messages.msg(link.messageKey)}"></span>
                  </a>
                </li>
              </ul>
            </div>
            <div th:if="${not #lists.isEmpty(navigation.basic)}">
              <span id="nav-group-basic-label" class="sr-only nav-group-label">
                :<th:block th:text="#{nav.basic}">me</th:block>
              </span>
              <ul aria-labelledby="nav-group-basic-label">
                <li th:each="link : ${navigation.basic}">
                  <a
                    th:unless="${not #lists.isEmpty(link.subItems)}"
                    class="navigation-link flex items-center gap-2"
                    th:classappend="${link.active ? 'navigation-link--active' : ''}"
                    th:id="${link.id}"
                    th:href="@{__${link.href}__}"
                    th:data-test-id="${link.dataTestId}"
                  >
                    <th:block th:if="${not #strings.isEmpty(link.iconName)}">
                      <svg th:replace="~{'icon/' + __${link.iconName}__ :: svg(className='nav-link-badge w-5 h-5')}" />
                    </th:block>
                    <span
                      th:if="${#strings.isEmpty(link.iconName)}"
                      class="nav-link-badge"
                      aria-hidden="true"
                      th:text="${#strings.substring(#messages.msg(link.messageKey), 0, 1)}"
                    ></span>
                    <span class="nav-link-text" th:text="${#messages.msg(link.messageKey)}"></span>
                  </a>
                  <button
                    th:if="${not #lists.isEmpty(link.subItems)}"
                    type="button"
                    class="navigation-link flex items-center gap-2"
                    th:classappend="${link.active ? 'navigation-link--active' : ''}"
                    th:id="${link.id}"
                    th:data-href="@{__${link.href}__}"
                    th:data-test-id="${link.dataTestId}"
                    aria-haspopup="true"
                  >
                    <th:block th:if="${not #strings.isEmpty(link.iconName)}">
                      <svg th:replace="~{'icon/' + __${link.iconName}__ :: svg(className='nav-link-badge w-5 h-5')}" />
                    </th:block>
                    <span
                      th:if="${#strings.isEmpty(link.iconName)}"
                      class="nav-link-badge"
                      aria-hidden="true"
                      th:text="${#strings.substring(#messages.msg(link.messageKey), 0, 1)}"
                    ></span>
                    <span class="nav-link-text" th:text="${#messages.msg(link.messageKey)}"></span>
                  </button>
                  <ul th:if="${not #lists.isEmpty(link.subItems)}" class="subnav-group">
                    <li th:each="subLink : ${link.subItems}">
                      <a
                        class="navigation-sublink"
                        th:classappend="${subLink.active ? 'navigation-sublink--active' : ''}"
                        th:href="@{__${subLink.href}__}"
                        th:id="${subLink.id}"
                        th:data-test-id="${subLink.dataTestId}"
                      >
                        <th:block th:text="${#messages.msg(subLink.messageKey)}"></th:block>
                      </a>
                    </li>
                  </ul>
                </li>
              </ul>
            </div>
            <div th:if="${not #lists.isEmpty(navigation.company)}">
              <span id="nav-group-company-label" class="nav-group-label">
                :<th:block th:text="#{nav.company}">Unternehmen</th:block>
              </span>
              <ul aria-labelledby="nav-group-company-label">
                <li th:each="link : ${navigation.company}">
                  <a
                    th:unless="${not #lists.isEmpty(link.subItems)}"
                    class="navigation-link flex items-center gap-2"
                    th:classappend="${link.active ? 'navigation-link--active' : ''}"
                    th:href="@{__${link.href}__}"
                    th:id="${link.id}"
                    th:data-test-id="${link.dataTestId}"
                  >
                    <th:block th:if="${not #strings.isEmpty(link.iconName)}">
                      <svg th:replace="~{'icon/' + __${link.iconName}__ :: svg(className='nav-link-badge w-5 h-5')}" />
                    </th:block>
                    <span
                      th:if="${#strings.isEmpty(link.iconName)}"
                      class="nav-link-badge"
                      aria-hidden="true"
                      th:text="${#strings.substring(#messages.msg(link.messageKey), 0, 1)}"
                    ></span>
                    <span class="nav-link-text" th:text="${#messages.msg(link.messageKey)}"></span>
                  </a>
                  <button
                    th:if="${not #lists.isEmpty(link.subItems)}"
                    type="button"
                    class="navigation-link flex items-center gap-2"
                    th:classappend="${link.active ? 'navigation-link--active' : ''}"
                    th:id="${link.id}"
                    th:data-href="@{__${link.href}__}"
                    th:data-test-id="${link.dataTestId}"
                    aria-haspopup="true"
                  >
                    <th:block th:if="${not #strings.isEmpty(link.iconName)}">
                      <svg th:replace="~{'icon/' + __${link.iconName}__ :: svg(className='nav-link-badge w-5 h-5')}" />
                    </th:block>
                    <span
                      th:if="${#strings.isEmpty(link.iconName)}"
                      class="nav-link-badge"
                      aria-hidden="true"
                      th:text="${#strings.substring(#messages.msg(link.messageKey), 0, 1)}"
                    ></span>
                    <span class="nav-link-text" th:text="${#messages.msg(link.messageKey)}"></span>
                  </button>
                  <ul th:if="${not #lists.isEmpty(link.subItems)}" class="subnav-group">
                    <li th:each="subLink : ${link.subItems}">
                      <a
                        class="navigation-sublink"
                        th:classappend="${subLink.active ? 'navigation-sublink--active' : ''}"
                        th:href="@{__${subLink.href}__}"
                        th:id="${subLink.id}"
                        th:data-test-id="${subLink.dataTestId}"
                      >
                        <th:block th:text="${#messages.msg(subLink.messageKey)}"></th:block>
                      </a>
                    </li>
                  </ul>
                </li>
              </ul>
            </div>
            <div th:if="${not #lists.isEmpty(navigation.settings)}">
              <span id="nav-group-settings-label" class="nav-group-label">
                :<th:block th:text="#{nav.settings}">Einstellungen</th:block>
              </span>
              <ul aria-labelledby="nav-group-settings-label">
                <li th:each="link : ${navigation.settings}">
                  <a
                    class="navigation-link flex items-center gap-2"
                    th:classappend="${link.active ? 'navigation-link--active' : ''}"
                    th:href="@{__${link.href}__}"
                    th:id="${link.id}"
                    th:data-test-id="${link.dataTestId}"
                  >
                    <th:block th:if="${not #strings.isEmpty(link.iconName)}">
                      <svg th:replace="~{'icon/' + __${link.iconName}__ :: svg(className='nav-link-badge w-5 h-5')}" />
                    </th:block>
                    <span
                      th:if="${#strings.isEmpty(link.iconName)}"
                      class="nav-link-badge"
                      aria-hidden="true"
                      th:text="${#strings.substring(#messages.msg(link.messageKey), 0, 1)}"
                    ></span>
                    <span class="nav-link-text" th:text="${#messages.msg(link.messageKey)}"></span>
                  </a>
                </li>
              </ul>
            </div>
            <uv-sticky data-sticky="bottom" class="navigation-inner__bottom flex flex-col gap-2">
              <a
                id="global-help-button"
                class="navigation-link flex items-center gap-2"
                th:href="${menuHelpUrl}"
                target="_blank"
                rel="noopener"
              >
                <svg th:replace="~{icon/help-circle::svg(className='nav-help-icon h-5 w-5')}" />
                <span
                  class="nav-link-text whitespace-nowrap text-ellipsis overflow-hidden"
                  style="min-width: 0"
                  th:text="#{nav.help.title}"
                ></span>
              </a>
              <button
                id="nav-toggle"
                class="navigation-link hidden desktop:flex items-center gap-2"
                th:aria-label="#{nav.toggle.aria-label}"
                aria-expanded="true"
              >
                <svg th:replace="~{icon/panel-left::svg(className='w-5 h-5')}" />
                <span class="nav-link-text" th:text="#{nav.toggle.text}"></span>
              </button>
            </uv-sticky>
          </div>
        </nav>
      </div>
    </th:block>
  </body>
</html>
