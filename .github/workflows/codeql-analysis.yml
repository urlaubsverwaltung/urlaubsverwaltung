name: "Code scanning - action"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 2'
env:
  MAVEN_ARGS: "--no-transfer-progress --errors --fail-at-end --show-version"

jobs:
  CodeQL-Build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 2

      - run: git checkout HEAD^2
        if: ${{ github.event_name == 'pull_request' }}

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: javascript, java

      # Autobuild does not work so we build it by our own
      - name: Set up JDK from .tool-versions
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'liberica'
          java-version-file: ".tool-versions"
          cache: 'maven'
      - name: Build with Maven
        run: ./mvnw package -DskipTests
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7
