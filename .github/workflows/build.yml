name: Build

on:
  schedule:
    - cron: "15 0 * * *"
    - cron: "15 23 * * *"
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".examples/**"
      - ".githooks/**"
      - "charts/**"
      - "docker/**"
    branches:
      - main
      - v5.x
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".examples/**"
      - ".githooks/**"
      - "charts/**"
      - "docker/**"
  workflow_dispatch:

env:
  MAVEN_ARGS: "--no-transfer-progress --errors --fail-at-end --show-version"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1  # required browsers are installed below

jobs:
  build:
    name: build and analyse
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up JDK from .tool-versions
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'liberica'
          java-version-file: ".tool-versions"
          cache: 'maven'

      - name: Build
        run: ./mvnw -Pcoverage dependency:go-offline clean verify -Dgroups="!ui"

      - name: Analyse with SonarCloud
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        run: >
          ./mvnw
          -Pcoverage
          sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=urlaubsverwaltung
          -Dsonar.projectKey=urlaubsverwaltung_urlaubsverwaltung
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml
          -Dsonar.javascript.lcov.reportPaths=target/js-coverage/lcov.info
          -Dsonar.javascript.exclusions=**/__tests__/**,**/*-spec.js,**/*.spec.js,**/*-test.js,**/*.test.js
          -Dsonar.eslint.reportPaths=target/js-eslint/report.json
          -Dsonar.coverage.exclusions=**/__tests__/**,**/*-spec.js,**/*.spec.js,**/*-test.js,**/*.test.js
          -Dsonar.sources=src/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ui-test:
    name: UI Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: ["chromium", "firefox", "webkit"]
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-ui-test-${{ matrix.browser }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK from .tool-versions
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'liberica'
          java-version-file: ".tool-versions"
          cache: 'maven'

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ hashFiles('**/pom.xml') }}

      - name: Install Playwright Browsers (UI tests)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./mvnw exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.classpathScope="test" -D exec.args="install ${{matrix.browser}}"

      - name: Install Playwright System Deps (UI tests)
        run: ./mvnw exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.classpathScope="test" -D exec.args="install-deps ${{matrix.browser}}"

      - name: Test
        run: ./mvnw dependency:go-offline verify -Pui-test -Dbrowser=${{matrix.browser}}

      - name: Upload artifacts of failed tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ always() && hashFiles(format('target/ui-test/{0}/FAILED-*', matrix.browser)) != '' }}
        with:
          name: urlaubsverwaltung-failed-ui-tests-${{ matrix.browser }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/ui-test/${{matrix.browser}}/FAILED-*

  a11y-test:
    name: Accessibility Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: ["chromium", "firefox", "webkit"]
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-a11y-test-${{ matrix.browser }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK from .tool-versions
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version-file: ".tool-versions"
          cache: 'maven'

      - name: Install Playwright Browsers (A11Y tests)
        run: ./mvnw exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.classpathScope="test" -D exec.args="install --with-deps ${{matrix.browser}}"

      - name: Test
        run: ./mvnw dependency:go-offline verify -Pa11y-test -Dbrowser=${{matrix.browser}}

      - name: Upload artifacts of failed tests
        uses: actions/upload-artifact@v7
        if: ${{ always() && hashFiles('target/a11y-test/**/FAILED-*') != '' }}
        with:
          name: failed-a11y-tests-${{ matrix.browser }}-${{ github.run_attempt }}
          path: target/a11y-test/**/FAILED-*
